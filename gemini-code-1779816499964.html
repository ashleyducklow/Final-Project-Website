<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's for Dinner?</title>
    <style>
        /* CSS Reset and Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #ff4757;
            --secondary-color: #2e3131;
            --background-color: #f7f9fa;
            --card-color: #ffffff;
        }

        body {
            background-color: var(--background-color);
            color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Styling */
        .container {
            background-color: var(--card-color);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: var(--secondary-color);
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 2rem;
        }

        /* Decision Display Area */
        .result-display {
            background-color: #f1f2f6;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px dashed #ced6e0;
        }

        .result-placeholder {
            color: #a4b0be;
            font-style: italic;
            font-size: 1.1rem;
        }

        .meal-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .meal-type {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #747d8c;
            margin-top: 0.5rem;
        }

        /* Button Styling */
        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        .action-btn:hover {
            background-color: #ff6b81;
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Add Custom Item Section */
        .custom-input-group {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e4e7eb;
            display: flex;
            gap: 10px;
        }

        .custom-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #ced6e0;
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
        }

        .custom-input:focus {
            border-color: var(--primary-color);
        }

        .add-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .add-btn:hover {
            background-color: #434747;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>What's for Dinner?</h1>
        <p class="subtitle">Can't make up your mind? Let us choose for you.</p>

        <div class="result-display" id="resultDisplay">
            <span class="result-placeholder">Click the button below to decide...</span>
        </div>

        <button class="action-btn" id="decideBtn">Pick a Meal!</button>

        <div class="custom-input-group">
            <input type="text" id="customMealInput" class="custom-input" placeholder="Add your own favorite dish...">
            <button class="add-btn" id="addMealBtn">Add</button>
        </div>
    </div>

    <script>
        // Default list of dinner options
        const dinnerOptions = [
            { name: "🍕 Homemade Pizza", type: "Comfort Food" },
            { name: "🍝 Pasta Carbonara", type: "Italian" },
            { name: "🌮 Crunchy Tacos", type: "Mexican" },
            { name: "🥗 Grilled Chicken Caesar Salad", type: "Light & Healthy" },
            { name: "🍔 Smash Burgers & Fries", type: "Classic American" },
            { name: "🍲 Warm Ramen Noodles", type: "Asian" },
            { name: "🍛 Thai Chickpea Curry", type: "Spicy & Hearty" },
            { name: "🥩 Steak with Mashed Potatoes", type: "Gourmet" }
        ];

        const resultDisplay = document.getElementById('resultDisplay');
        const decideBtn = document.getElementById('decideBtn');
        const customMealInput = document.getElementById('customMealInput');
        const addMealBtn = document.getElementById('addMealBtn');

        // Function to pick a random meal
        function pickDinner() {
            // Simple loading effect
            resultDisplay.innerHTML = '<span class="result-placeholder">Thinking... 🤔</span>';
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * dinnerOptions.length);
                const selection = dinnerOptions[randomIndex];
                
                resultDisplay.innerHTML = `
                    <div class="meal-title">${selection.name}</div>
                    <div class="meal-type">${selection.type}</div>
                `;
            }, 300); // 300ms delay to simulate "thinking"
        }

        // Function to add a custom meal
        function addCustomMeal() {
            const mealName = customMealInput.value.trim();
            if (mealName !== "") {
                dinnerOptions.push({ name: mealName, type: "User Custom Choice" });
                alert(`Added "${mealName}" to your dinner wheel!`);
                customMealInput.value = ""; // Clear input
            } else {
                alert("Please type something in first!");
            }
        }

        // Event Listeners
        decideBtn.addEventListener('click', pickDinner);
        addMealBtn.addEventListener('click', addCustomMeal);
        
        // Allow pressing 'Enter' key to add meal
        customMealInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addCustomMeal();
            }
        });
    </script>
</body>
</html>
